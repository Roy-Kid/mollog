name: Bug report
description: Report a defect or behavioral regression in mollog
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Provide a minimal reproduction when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include sample code and exact steps.
      placeholder: |
        1. Configure logging like this...
        2. Run this code...
        3. Observe this output...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, mollog version, OS, and anything relevant.
    validations:
      required: true
